name: Build patched jar

on:
  push:
    branches:
      - claude/apply-patch-9S4ox
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip build jar]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean build --no-daemon

      - name: Copy jar artifact into repo
        run: |
          mkdir -p artifacts
          cp build/libs/*.jar artifacts/
          ls -la artifacts

      - name: Commit built jar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f artifacts/*.jar
          if git diff --cached --quiet; then
            echo "No jar changes to commit."
          else
            git commit -m "Add patched jar artifact [skip build jar]"
            git push
          fi
